<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antelopes Scores</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --forest: #0a0a0a;
  --green:  #111111;
  --green2: #181818;
  --gold:   #C9A84C;
  --gold2:  #E8C96A;
  --text:   #F0EAD6;
  --muted:  #7A8C6E;
  --card:   #0f0f0f;
  --border: #252525;
  --red:    #C0392B;
  --win:    #2E7D32;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--forest); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; }

/* ヘッダー */
header {
  background: linear-gradient(160deg, #000000 0%, #111111 60%, #0a0a0a 100%);
  border-bottom: 2px solid var(--gold);
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

/* 鹿シルエットSVG */
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; letter-spacing: 6px;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.8);
  line-height: 1;
}
.logo-sub {
  font-size: 0.6rem; color: var(--muted);
  letter-spacing: 4px; margin-top: 4px;
  text-transform: uppercase;
}

/* タブ */
.tabs {
  display: flex;
  background: #0f0f0f;
  border-bottom: 2px solid var(--border);
  position: sticky; top: 92px; z-index:99;
}
.tab {
  flex:1; padding:13px 8px;
  text-align:center; font-size:0.75rem; font-weight:700;
  color:var(--muted); cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all 0.25s; letter-spacing:1px;
}
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }

.section { display:none; padding:16px; }
.section.active { display:block; }

/* ボタン */
.btn {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--forest); border:none; border-radius:8px;
  padding:10px 18px; font-weight:900; font-size:0.85rem;
  cursor:pointer; font-family:'Noto Sans JP',sans-serif;
  transition:all 0.2s; white-space:nowrap;
  box-shadow: 0 2px 8px rgba(201,168,76,0.3);
}
.btn:active { opacity:0.8; transform:scale(0.97); }

/* インプット */
input[type=password], input[type=text], input[type=date], input[type=number] {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius:8px; color:var(--text);
  padding:10px 12px; font-size:0.85rem;
  font-family:'Noto Sans JP',sans-serif;
  width:100%; outline:none;
  transition:border-color 0.2s;
}
input:focus { border-color:var(--gold); }
input[type=date] { color-scheme: dark; color: var(--text); }
input[type=number] { text-align:center; font-size:1.1rem; font-weight:700; }
label { display:block; font-size:0.68rem; color:var(--muted); margin-bottom:4px; letter-spacing:1px; }

/* フォームカード */
.form-card {
  background: linear-gradient(160deg, #111111, #0a0a0a);
  border:1px solid var(--border); border-radius:14px;
  padding:20px; margin-bottom:16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.form-card h3 { font-size:0.75rem; color:var(--gold); letter-spacing:3px; margin-bottom:16px; text-transform:uppercase; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.row1 { margin-bottom:10px; }

/* クォーター */
.q-block {
  background:rgba(0,0,0,0.3); border:1px solid var(--border);
  border-radius:10px; padding:12px; margin-bottom:10px;
}
.q-block-title { font-size:0.68rem; color:var(--muted); letter-spacing:2px; margin-bottom:10px; }
.q-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.q-col { text-align:center; }
.q-col label { color:var(--gold); font-weight:700; font-size:0.65rem; }

/* ライブプレビュー */
.live-preview {
  background: rgba(192,57,43,0.08);
  border:1px solid rgba(192,57,43,0.35);
  border-radius:10px; padding:14px; margin-bottom:12px;
}
.live-preview-title { font-size:0.65rem; color:#e74c3c; letter-spacing:2px; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.live-score-row { display:flex; align-items:center; justify-content:center; gap:16px; }
.live-team { text-align:center; }
.live-team-name { font-size:0.65rem; color:var(--muted); margin-bottom:4px; }
.live-num { font-family:'Bebas Neue',sans-serif; font-size:2.6rem; line-height:1; color:var(--text); }
.live-num.ahead { color:var(--gold); }
.live-vs { font-family:'Bebas Neue',sans-serif; color:var(--muted); font-size:0.9rem; }

/* ログイン */
.login-box {
  background: linear-gradient(160deg, #111111, #0a0a0a);
  border:1px solid var(--border); border-radius:14px;
  padding:32px 20px; text-align:center; margin-bottom:16px;
}
.login-box h3 { font-size:0.85rem; color:var(--muted); letter-spacing:3px; margin-bottom:20px; }
.pw-row { display:flex; gap:8px; max-width:280px; margin:0 auto; }

/* 管理者ヘッダー */
.admin-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.admin-badge {
  background: rgba(201,168,76,0.12);
  border:1px solid var(--gold); color:var(--gold);
  font-size:0.65rem; padding:5px 12px; border-radius:100px; letter-spacing:1px;
}
.admin-btns { display:flex; gap:8px; }

/* 統計 */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:0; }
.stat-card {
  background: rgba(255,255,255,0.05);
  border:1px solid var(--border); border-radius:10px;
  padding:10px 8px; text-align:center;
}
.stat-num { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--gold); line-height:1; }
.stat-label { font-size:0.62rem; color:var(--muted); margin-top:4px; letter-spacing:1px; font-weight:900; }

/* 試合カード */
.match-list { display:flex; flex-direction:column; gap:14px; }
.match-card {
  background: linear-gradient(160deg, #111111, #0a0a0a);
  border:1px solid var(--border); border-radius:14px;
  overflow:hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  animation: fadeIn 0.35s ease;
}
.match-card.is-live {
  border-color: rgba(192,57,43,0.6);
  box-shadow: 0 0 20px rgba(192,57,43,0.15);
}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.card-header {
  background: linear-gradient(90deg, rgba(201,168,76,0.10), transparent);
  padding:13px 16px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:flex-start;
}
.card-header.is-live { background:linear-gradient(90deg, rgba(192,57,43,0.15), transparent); }
.card-title { font-size:0.95rem; font-weight:900; color:var(--text); }
.card-meta { font-size:0.65rem; color:var(--muted); margin-top:3px; }

.result-badge {
  font-family:'Bebas Neue',sans-serif; font-size:0.95rem;
  letter-spacing:2px; padding:5px 12px; border-radius:8px;
  display:flex; align-items:center; gap:4px;
}
.badge-win  { background:rgba(46,125,50,0.25); color:#66BB6A; border:1px solid rgba(46,125,50,0.4); }
.badge-lose { background:rgba(192,57,43,0.2);  color:#EF5350; border:1px solid rgba(192,57,43,0.4); }
.badge-draw { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
.badge-live { background:rgba(192,57,43,0.2);   color:#e74c3c; border:1px solid rgba(192,57,43,0.4); }

.card-body { padding:16px; }

/* スコアエリア */
.score-area {
  background: #ffffff;
  border:1px solid #ddd;
  border-radius:12px; padding:20px 10px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
}
.score-area::before {
  content:'';
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:120px; height:120px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,0.08);
  pointer-events:none;
}
.score-area::after {
  content:'';
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:200px; height:200px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,0.04);
  pointer-events:none;
}
.score-row { display:flex; align-items:center; gap:10px; position:relative; z-index:1; }
.score-team { flex:1; text-align:center; }
.score-team-name { font-size:0.75rem; color:#333333; margin-bottom:6px; letter-spacing:2px; text-transform:uppercase; font-weight:900; }
.score-num { font-family:'Bebas Neue',sans-serif; font-size:4.5rem; line-height:1; color:#111111; }
.score-num.winner { color:#b8860b; text-shadow:none; }
.score-divider { display:flex; flex-direction:column; align-items:center; gap:2px; }
.score-vs { font-family:'Bebas Neue',sans-serif; font-size:0.85rem; color:#888888; letter-spacing:2px; }
.score-line { width:1px; height:40px; background:#cccccc; }

/* クォーター詳細 */
.q-detail-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:6px;
}
.q-detail-item {
  background: #ffffff;
  border:1px solid #ddd; border-radius:8px;
  padding:8px 4px; text-align:center;
}
.q-detail-label { font-size:0.58rem; color:#b8860b; font-weight:700; display:block; margin-bottom:4px; letter-spacing:1px; }
.q-detail-score { font-size:0.8rem; font-weight:700; color:#111111; }
.q-detail-score span { color:#888888; font-weight:400; }

.card-footer {
  padding:10px 16px; display:flex; justify-content:flex-end; gap:8px;
  border-top:1px solid var(--border);
  background: rgba(0,0,0,0.15);
}

/* 空 */
.empty { text-align:center; padding:60px 20px; color:var(--muted); }
.empty-icon { font-size:3rem; margin-bottom:12px; }
.empty-text { font-size:0.85rem; }

/* トースト */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(120px);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--forest); padding:12px 24px; border-radius:100px;
  font-size:0.8rem; font-weight:900;
  transition:transform 0.3s; z-index:9999;
  white-space:nowrap; pointer-events:none;
  box-shadow:0 4px 16px rgba(201,168,76,0.4);
}
.toast.show { transform:translateX(-50%) translateY(0); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.dot { display:inline-block; width:7px; height:7px; background:#e74c3c; border-radius:50%; animation:blink 1s infinite; }

/* 区切り線 */
.divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:14px 0; }
</style>
</head>

          <div class="q-grid">
            <div class="q-col"><label>1Q終了</label><input type="number" id="h1" min="0" value="0" oninput="updatePreview()"></div>
            <div class="q-col"><label>2Q終了</label><input type="number" id="h2" min="0" value="0" oninput="updatePreview()"></div>
            <div class="q-col"><label>3Q終了</label><input type="number" id="h3" min="0" value="0" oninput="updatePreview()"></div>
            <div class="q-col"><label>4Q終了</label><input type="number" id="h4" min="0" value="0" oninput="updatePreview()"></div>
          </div>
        </div>
        <div class="divider"></div>
        <div style="margin-top:12px">
          <label style="margin-bottom:8px;color:var(--muted)">🆚 相手チーム（累計スコア）</label>
          <div class="q-grid">
            <div class="q-col"><label>1Q終了</label><input type="number" id="a1" min="0" value="0" oninput="updatePreview()"></div>
            <div class="q-col"><label>2Q終了</label><input type="number" id="a2" min="0" value="0" oninput="updatePreview()"></div>
            <div class="q-col"><label>3Q終了</label><input type="number" id="a3" min="0" value="0" oninput="updatePreview()"></div>
            <div class="q-col"><label>4Q終了</label><input type="number" id="a4" min="0" value="0" oninput="updatePreview()"></div>
          </div>
        </div>
      </div>

      <!-- プレビュー -->
      <div class="live-preview">
        <div class="live-preview-title"><span class="dot"></span>入力中プレビュー</div>
        <div class="live-score-row">
          <div class="live-team">
            <div class="live-team-name">ANTELOPES</div>
            <div class="live-num" id="prevH">0</div>
          </div>
          <div class="live-vs">VS</div>
          <div class="live-team">
            <div class="live-team-name" id="prevOpp">相手</div>
            <div class="live-num" id="prevA">0</div>
          </div>
        </div>
      </div>

      <button class="btn" style="background:#8B0000;color:#fff;box-shadow:0 2px 8px rgba(139,0,0,0.4);width:100%;margin-bottom:10px;padding:13px" onclick="doLive()">🔴 LIVE保存（試合中）</button>
      <button class="btn" style="background:linear-gradient(135deg,#1a5c2a,#2e7d40);color:#fff;box-shadow:0 2px 8px rgba(30,100,50,0.4);width:100%;padding:14px;font-size:0.95rem" onclick="doConfirm()">✅ 試合確定して登録</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
window.addEventListener("load", function() {
var matches = [];
var liveId = null;
var editId = null;
var isAdmin = false;

// Firebase設定
var firebaseConfig = {
  apiKey: "AIzaSyDccBj-qkrhtDSzWMvBYNBHOM1S7PhL46g",
  authDomain: "antelopes-manager.firebaseapp.com",
  projectId: "antelopes-manager",
  storageBucket: "antelopes-manager.firebasestorage.app",
  messagingSenderId: "1067922126784",
  appId: "1:1067922126784:web:f241e05fce519e2cf83a25"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var auth = firebase.auth();

// ログイン状態を監視
firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    isAdmin = true;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    var btn = document.querySelector('#loginBox .btn');
    if (btn) { btn.textContent = 'ログイン'; btn.disabled = false; }
    if (liveId) {
      for (var i = 0; i < matches.length; i++) {
        if (matches[i].id === liveId) { fillForm(matches[i]); break; }
      }
    }
    updatePreview();
    toast('✅ ログインしました');
    render();
  } else {
    isAdmin = false;
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
    render();
  }
});

// Firestoreからデータ読み込み＆リアルタイム更新
function loadData() {
  db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(function(snapshot) {
    matches = [];
    snapshot.forEach(function(doc) {
      var d = doc.data();
      d.id = doc.id;
      matches.push(d);
    });
    db.collection('meta').doc('state').get().then(function(doc) {
      liveId = doc.exists ? (doc.data().liveId || null) : null;
    });
    render();
  });
}

// Firestoreにデータ保存
function saveData() {
  // saveDataは個別関数で処理するため空にする
}

function saveMeta() {
  db.collection('meta').doc('state').set({ liveId: liveId });
}

function switchTab(t) {
  document.getElementById('view').classList.toggle('active', t === 'view');
  document.getElementById('admin').classList.toggle('active', t === 'admin');
  document.getElementById('tab-view').classList.toggle('active', t === 'view');
  document.getElementById('tab-admin').classList.toggle('active', t === 'admin');
  if (t === 'view') render();
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function doLogin() {
  var email = document.getElementById('emailInput').value.trim();
  var pw = document.getElementById('pwInput').value;
  if (!email || !pw) { toast('⚠️ メールとパスワードを入力してください'); return; }
  var btn = document.querySelector('#loginBox .btn');
  btn.textContent = '...';
  btn.disabled = true;
  firebase.auth().signInWithEmailAndPassword(email, pw)
    .then(function() {
      // onAuthStateChanged が処理する
    })
    .catch(function(e) {
      btn.textContent = 'ログイン';
      btn.disabled = false;
      document.getElementById('pwInput').value = '';
      toast('❌ ログイン失敗: メールまたはパスワードが違います');
    });
}

function doLogout() {
  firebase.auth().signOut().then(function() {
    isAdmin = false;
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('emailInput').value = '';
    document.getElementById('pwInput').value = '';
    var btn = document.querySelector('#loginBox .btn');
    btn.textContent = 'ログイン';
    btn.disabled = false;
    render();
    toast('👋 ログアウトしました');
  });
}

function gv(id) { return document.getElementById(id).value.trim(); }
function gn(id) { return parseInt(document.getElementById(id).value) || 0; }

function fillForm(m) {
  document.getElementById('fName').value = m.name || '';
  document.getElementById('fDate').value = m.date || '';
  document.getElementById('fPlace').value = m.place || '';
  document.getElementById('fOpp').value = m.opp || '';
  var hids = ['h1','h2','h3','h4'], aids = ['a1','a2','a3','a4'];
  for (var i = 0; i < 4; i++) {
    document.getElementById(hids[i]).value = m.hq[i] || 0;
    document.getElementById(aids[i]).value = m.aq[i] || 0;
  }
  editId = m.id;
}

function clearForm() {
  var ids = ['fName','fDate','fPlace','fOpp'];
  for (var i = 0; i < ids.length; i++) document.getElementById(ids[i]).value = '';
  var qids = ['h1','h2','h3','h4','a1','a2','a3','a4'];
  for (var i = 0; i < qids.length; i++) document.getElementById(qids[i]).value = 0;
  editId = null;
  document.getElementById('formTitle').textContent = '📝 試合を登録する';
  updatePreview();
}

function validateQScores() {
  var hq = [gn('h1'),gn('h2'),gn('h3'),gn('h4')];
  var aq = [gn('a1'),gn('a2'),gn('a3'),gn('a4')];
  var errors = [];
  var labels = ['1Q','2Q','3Q','4Q'];
  for (var i = 1; i < 4; i++) {
    if (hq[i] > 0 && hq[i] < hq[i-1]) {
      errors.push('アンテロープス: ' + labels[i] + '終了(' + hq[i] + '点) が ' + labels[i-1] + '終了(' + hq[i-1] + '点) より小さいです');
    }
    if (aq[i] > 0 && aq[i] < aq[i-1]) {
      errors.push('相手チーム: ' + labels[i] + '終了(' + aq[i] + '点) が ' + labels[i-1] + '終了(' + aq[i-1] + '点) より小さいです');
    }
  }
  var el = document.getElementById('qError');
  if (errors.length > 0) {
    el.style.display = 'block';
    el.innerHTML = '⚠️ 入力エラー<br>' + errors.join('<br>');
  } else {
    el.style.display = 'none';
    el.innerHTML = '';
  }
  return errors.length === 0;
}

function updatePreview() {
  validateQScores();
  var h = Math.max(gn('h1'),gn('h2'),gn('h3'),gn('h4'));
  var a = Math.max(gn('a1'),gn('a2'),gn('a3'),gn('a4'));
  var opp = gv('fOpp') || '相手';
  document.getElementById('prevH').textContent = h;
  document.getElementById('prevA').textContent = a;
  document.getElementById('prevOpp').textContent = opp;
  document.getElementById('prevH').className = 'live-num' + (h > a ? ' ahead' : '');
  document.getElementById('prevA').className = 'live-num' + (a > h ? ' ahead' : '');
}

function buildMatch(isLive) {
  var name = gv('fName'), date = gv('fDate'), opp = gv('fOpp');
  if (!name || !date || !opp) { toast('⚠️ 大会名・日付・対戦相手は必須です'); return null; }
  var hq = [gn('h1'),gn('h2'),gn('h3'),gn('h4')];
  var aq = [gn('a1'),gn('a2'),gn('a3'),gn('a4')];
  return { id: editId || Date.now(), name:name, date:date, place:gv('fPlace'), opp:opp, hq:hq, aq:aq, ht:Math.max(hq[0],hq[1],hq[2],hq[3]), at:Math.max(aq[0],aq[1],aq[2],aq[3]), live:isLive };
}

function doLive() {
  if (!validateQScores()) { return; }
  var m = buildMatch(true); if (!m) return;
  m.createdAt = firebase.firestore.FieldValue.serverTimestamp();
  if (editId) {
    db.collection('matches').doc(String(editId)).set(m).then(function() {
      liveId = String(editId);
      saveMeta();
      toast('🔴 LIVEで保存しました！');
    }).catch(function(e) { toast('❌ エラー: ' + e.message); });
  } else {
    db.collection('matches').add(m).then(function(ref) {
      editId = ref.id;
      liveId = ref.id;
      saveMeta();
      toast('🔴 LIVEで保存しました！');
    }).catch(function(e) { toast('❌ エラー: ' + e.message); });
  }
}

function doConfirm() {
  if (!validateQScores()) { return; }
  var m = buildMatch(false); if (!m) return;
  m.createdAt = firebase.firestore.FieldValue.serverTimestamp();
  if (editId) {
    db.collection('matches').doc(String(editId)).set(m).then(function() {
      liveId = null;
      saveMeta();
      clearForm();
      toast('🏆 試合確定！登録しました！');
    });
  } else {
    db.collection('matches').add(m).then(function() {
      liveId = null;
      saveMeta();
      clearForm();
      toast('🏆 試合確定！登録しました！');
    }).catch(function(e) { toast('❌ エラー: ' + e.message); });
  }
}

function doEdit(btn) {
  var id = btn.getAttribute('data-id');
  for (var i = 0; i < matches.length; i++) {
    if (String(matches[i].id) === id) { fillForm(matches[i]); break; }
  }
  document.getElementById('formTitle').textContent = '✏️ 試合を編集する';
  switchTab('admin'); updatePreview(); window.scrollTo(0,0);
}

function doDelete(btn) {
  var id = btn.getAttribute('data-id');
  if (!confirm('この試合を削除しますか？')) return;
  db.collection('matches').doc(id).delete().then(function() {
    if (liveId === id) { liveId = null; saveMeta(); }
    toast('🗑️ 削除しました');
  });
}

function doExcel() {
  var done = [];
  for (var i = 0; i < matches.length; i++) { if (!matches[i].live) done.push(matches[i]); }
  if (done.length === 0) { toast('⚠️ 確定済みの試合がありません'); return; }
  var rows = [], wins=0, loses=0, draws=0;
  for (var i = 0; i < done.length; i++) {
    var m = done[i];
    var d = m.date ? new Date(m.date).toLocaleDateString('ja-JP') : '';
    var r = m.ht > m.at ? '勝' : m.ht < m.at ? '負' : '引き分け';
    if (m.ht > m.at) wins++; else if (m.ht < m.at) loses++; else draws++;
    rows.push({ '日付':d, '大会名':m.name, '場所':m.place||'', '対戦相手':m.opp,
      '1Q(我)':m.hq[0], '1Q(相)':m.aq[0], '2Q(我)':m.hq[1]-m.hq[0], '2Q(相)':m.aq[1]-m.aq[0],
      '3Q(我)':m.hq[2]-m.hq[1], '3Q(相)':m.aq[2]-m.aq[1], '4Q(我)':m.hq[3]-m.hq[2], '4Q(相)':m.aq[3]-m.aq[2],
      '合計(我)':m.ht, '合計(相)':m.at, '結果':r });
  }
  rows.push({});
  rows.push({ '日付':'【集計】', '大会名':done.length+'試合', '対戦相手':wins+'勝 '+loses+'敗 '+draws+'分' });
  var ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:20},{wch:16},{wch:18},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:9},{wch:9},{wch:8}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '試合結果');
  XLSX.writeFile(wb, 'アンテロープス試合結果_'+new Date().getFullYear()+'.xlsx');
  toast('📊 Excelを出力しました！');
}

function render() {
  var list = document.getElementById('matchList');
  var statsRow = document.getElementById('statsRow');
  var done = [], wins=0, loses=0, draws=0;
  for (var i = 0; i < matches.length; i++) {
    if (!matches[i].live) {
      done.push(matches[i]);
      if (matches[i].ht > matches[i].at) wins++;
      else if (matches[i].ht < matches[i].at) loses++;
      else draws++;
    }
  }
  statsRow.innerHTML =
    '<div class="stat-card"><div class="stat-num">'+done.length+'</div><div class="stat-label">試合数</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#66BB6A">'+wins+'</div><div class="stat-label">WIN</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#EF5350">'+loses+'</div><div class="stat-label">LOSE</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:var(--gold)">'+draws+'</div><div class="stat-label">DRAW</div></div>';

  if (matches.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🦌</div><div class="empty-text">試合結果がまだありません</div></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var live = m.live, win = m.ht > m.at, draw = m.ht === m.at;
    var bClass = live ? 'badge-live' : win ? 'badge-win' : draw ? 'badge-draw' : 'badge-lose';
    var bText  = live ? '<span class="dot"></span>LIVE' : win ? 'WIN' : draw ? 'DRAW' : 'LOSE';
    var dateStr = '';
    if (m.date) { var dd = new Date(m.date); dateStr = dd.getFullYear()+'年'+(dd.getMonth()+1)+'月'+dd.getDate()+'日'; }
    var qs = '';
    for (var q = 0; q < 4; q++) {
      var hScore = q === 0 ? m.hq[0] : m.hq[q] - m.hq[q-1];
      var aScore = q === 0 ? m.aq[0] : m.aq[q] - m.aq[q-1];
      if (m.hq[q] === 0 && m.aq[q] === 0 && q > 0) { hScore = 0; aScore = 0; }
      qs += '<div class="q-detail-item"><span class="q-detail-label">'+(q+1)+'Q</span>'+
            '<div class="q-detail-score">'+hScore+'<span> - </span>'+aScore+'</div></div>';
    }
    var footer = '';
    if (isAdmin) {
      var mid = m.id;
      footer = '<div class="card-footer">' +
        '<button class="btn" style="background:transparent;border:1px solid var(--gold);color:var(--gold);font-size:0.7rem;padding:6px 12px" onclick="doEdit(this)" data-id="' + mid + '">✏️ 編集</button>' +
        '<button class="btn" style="background:var(--red);color:#fff;font-size:0.7rem;padding:6px 12px" onclick="doDelete(this)" data-id="' + mid + '">🗑️ 削除</button>' +
        '</div>';
    }
        html +=
      '<div class="match-card'+(live?' is-live':'')+'">' +
        '<div class="card-header'+(live?' is-live':'')+'">' +
          '<div><div class="card-title">'+m.name+'</div>'+
          '<div class="card-meta">📅 '+dateStr+'　📍 '+(m.place||'—')+'</div></div>'+
          '<div class="result-badge '+bClass+'">'+bText+'</div>'+
        '</div>'+
        '<div class="card-body">'+
          '<div class="score-area">'+
            '<div class="score-row">'+
              '<div class="score-team">'+
                '<div class="score-team-name">Antelopes</div>'+
                '<div class="score-num'+(win?' winner':'')+'">'+m.ht+'</div>'+
              '</div>'+
              '<div class="score-divider"><div class="score-line"></div><div class="score-vs">VS</div><div class="score-line"></div></div>'+
              '<div class="score-team">'+
                '<div class="score-team-name">'+m.opp+'</div>'+
                '<div class="score-num'+(!win&&!draw?' winner':'')+'">'+m.at+'</div>'+
              '</div>'+
            '</div>'+
          '</div>'+
          '<div class="q-detail-grid">'+qs+'</div>'+
        '</div>'+
        footer+
      '</div>';
  }
  list.innerHTML = html;
}

loadData();

// HTMLのonclickから呼べるようにグローバルに登録
window.switchTab = switchTab;
window.doLogin = doLogin;
  window.doLogout = doLogout;
window.doLive = doLive;
window.doConfirm = doConfirm;
window.doEdit = doEdit;
window.doDelete = doDelete;
window.doExcel = doExcel;
window.updatePreview = updatePreview;
  window.validateQScores = validateQScores;
}); // window.onload
</script>
</body>
</html>
